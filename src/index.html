<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Suitcase Shop</title>

    <link rel="stylesheet" href="../dist/css/main.css" />
  </head>
  <body>
    <header class="header">
      <div class="container">
        <a href="./index.html" class="logo">Suitcase Shop</a>

        <nav class="nav" aria-label="Main navigation">
          <ul class="nav__list">
            <li><a href="./html/catalog.html">Catalog</a></li>
            <li><a href="./html/about.html">About Us</a></li>
            <li><a href="./html/contact.html">Contact</a></li>
          </ul>
        </nav>

        <div class="header__actions">
          <button type="button" class="account-btn">👤</button>
          <button type="button" class="cart-btn">
            🛒 <span class="cart-count">0</span>
          </button>
        </div>
      </div>
    </header>

    <main>
      <section class="hero">
        <div class="container">
          <h1 class="hero__title">Travel Suitcases</h1>
          <p class="hero__subtitle">
            Discover the best luggage for your journey
          </p>
        </div>
      </section>

      <section class="featured-products">
        <div class="container">
          <h2 class="section-title">Featured Products</h2>
          <div class="products-grid"></div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="container">
        <p>© 2026 Suitcase Shop</p>

        <nav>
          <a href="./html/about.html">About Us</a>
          <a href="./html/contact.html">Contact</a>
        </nav>
      </div>
    </footer>

    <script src="../dist/js/main.js"></script>
  </body>
</html>
