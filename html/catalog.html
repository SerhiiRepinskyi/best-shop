<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Best shop | Catalog</title>

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <meta name="description" content="Catalog of products from Best Shop" />

    <link rel="stylesheet" href="/src/scss/main.scss" />
  </head>
  <body>
    <div id="header"></div>

    <main class="main">
      <section class="catalog">
        <div class="container catalog__container">
          <div class="catalog__top">
            <p class="catalog__results" data-catalog-results>
              Showing 0-0 Of 0 Results
            </p>

            <div class="catalog__controls" aria-label="Catalog controls">
              <label class="catalog__control">
                <span class="catalog__control-label visually-hidden">Sort products</span>
                <select class="catalog__select" name="sorting" aria-label="Sort products">
                  <option selected>Default Sorting</option>
                </select>
              </label>

              <label class="catalog__control catalog__control--search">
                <span class="catalog__control-label visually-hidden">Search models</span>
                <input
                  class="catalog__search"
                  type="search"
                  name="search"
                  placeholder="Search Models"
                  aria-label="Search models"
                />
              </label>
            </div>
          </div>

          <div class="catalog__layout">
            <div class="catalog__products">
              <ul class="catalog__products-list" data-catalog-products></ul>
            </div>

            <aside class="catalog__sidebar" aria-label="Top best sets">
              <h2 class="catalog__sidebar-title">Top Best Sets</h2>
              <ul class="catalog__sets-list" data-catalog-sets></ul>
            </aside>
          </div>
        </div>
      </section>
    </main>

    <div id="footer"></div>

    <script type="module" src="/src/ts/main.ts"></script>
  </body>
</html>
