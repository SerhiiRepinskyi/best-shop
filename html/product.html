<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Best Shop | Product Details</title>

    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <meta name="description" content="Product details from Best Shop" />

    <link rel="stylesheet" href="/src/scss/main.scss" />
  </head>
  <body>
    <div id="header"></div>

    <main class="main">
      <section class="product-details">
        <div class="container">
          <h1 class="visually-hidden">Product details</h1>
        </div>
      </section>

      <section class="product-collection-section">
        <div class="container product-collection-section__container">
          <div
            class="product-collection product-collection--product"
            data-product-collection-root
            data-collection-mode="random"
            data-collection-count="4"
          >
            <h2 class="product-collection__title">You May Also Like</h2>
            <ul class="product-collection__list" data-product-collection-list></ul>
          </div>
        </div>
      </section>
    </main>

    <div id="footer"></div>
    <div id="login-modal-root"></div>

    <script type="module" src="/src/ts/main.ts"></script>
  </body>
</html>
